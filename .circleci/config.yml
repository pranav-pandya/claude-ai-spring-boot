version: 2.1

jobs:
  build:
    docker:
      - image: cimg/openjdk:17.0
    steps:
      - checkout
      - run:
          name: Build and test
          command: mvn clean test
      - run:
          name: Package
          command: mvn package -DskipTests
      - store_test_results:
          paths:
            - target/surefire-reports

workflows:
  version: 2
  build_and_test:
    jobs:
      - build